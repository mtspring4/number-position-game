<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>なんばんめかな？</title>
    <style>
        :root {
            --primary-color: #ff9800;
            --bg-color: #fff9f0;
            --text-color: #333;
            --card-bg: #ffffff;
            --success-color: #4CAF50;
            --marker-order: #ffcc80; 
            --marker-count: #c8e6c9; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            touch-action: manipulation; user-select: none;
            overflow: hidden; height: 100vh;
        }

        #game-app {
            width: 100%; height: 100%; max-width: 500px;
            display: flex; flex-direction: column; position: relative;
            background-color: var(--bg-color);
        }

        .screen { display: none; flex-direction: column; align-items: center; padding: 15px; height: 100%; overflow-y: auto; position: relative; }
        .screen.active { display: flex; }

        /* 背景アニメーション */
        #title-screen { 
            justify-content: center; 
            background-color: #ffe0b2;
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.2) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0.2) 75%, transparent 75%, transparent);
            background-size: 100px 100px;
            animation: stripe-move 4s linear infinite;
        }
        @keyframes stripe-move {
            from { background-position: 0 0; }
            to { background-position: 100px 100px; }
        }

        .title-logo { font-size: 2.5rem; font-weight: bold; color: #e65100; text-shadow: 3px 3px 0 white; margin-bottom: 30px; text-align: center; line-height: 1.2; z-index: 2; }
        .title-animal-deco { font-size: 5rem; margin-bottom: 40px; animation: bounce 2s infinite; z-index: 2; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* ゲーム画面 */
        #game-screen { justify-content: space-between; padding-bottom: 30px; }
        .game-top { width: 100%; }
        .game-header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .progress-badge { background: var(--primary-color); color: white; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 1rem; }
        
        .question-box { 
            background: var(--card-bg); border: 4px solid #ffcc80; border-radius: 20px; 
            padding: 10px; margin-bottom: 10px; width: 100%; text-align: center; 
            box-shadow: 0 4px 0 #ffe0b2;
        }
        .question-label-in { font-size: 1rem; font-weight: 900; color: #ff5722; margin-bottom: 5px; border-bottom: 2px dashed #ffe0b2; padding-bottom: 2px; }
        .question-text { font-size: 1.5rem; font-weight: bold; line-height: 1.4; }

        .animal-row-container { 
            width: 100%; background: #fff; padding: 15px 5px; border-radius: 20px; 
            display: flex; flex-direction: column; justify-content: center; 
            position: relative; border: 2px solid #eee; margin: 10px 0;
        }
        
        .direction-labels { display: flex; justify-content: space-between; margin-bottom: 10px; padding: 0 10px; }
        .direction-labels span { 
            font-weight: 800; color: #555; font-size: 1.2rem; 
            background: #f0f0f0; padding: 4px 12px; border-radius: 12px;
        }
        
        .animal-row { display: flex; justify-content: space-around; align-items: center; width: 100%; min-height: 90px; }
        .animal-unit { cursor: pointer; font-size: clamp(2.5rem, 15vw, 4rem); transition: transform 0.2s; position: relative; z-index: 2; }

        /* 数字ボタンをさらに巨大化 */
        .button-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; padding: 5px 0; }
        .num-btn { 
            aspect-ratio: 1/1; border-radius: 15px; border: none; background-color: var(--success-color); 
            color: white; font-size: 3.5rem; font-weight: bold; box-shadow: 0 8px 0 #2E7D32; 
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .num-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 #2E7D32; }

        /* 解説モーダル */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 200; justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background: white; padding: 20px 10px; border-radius: 30px; width: 100%; max-width: 420px; text-align: center; }
        .explanation-box { background: #fdf2e9; padding: 25px 10px; border-radius: 20px; margin: 15px 0; position: relative; }
        .explain-animals { display: flex; justify-content: center; align-items: flex-end; gap: 2px; width: 100%; position: relative; padding-bottom: 25px; }
        .explain-item { flex: 1; display: flex; flex-direction: column; align-items: center; min-width: 35px; z-index: 2; position: relative; }
        .explain-num { width: 24px; height: 24px; border-radius: 50%; background: #ccc; color: white; font-size: 0.8rem; display: flex; justify-content: center; align-items: center; margin-bottom: 4px; font-weight: bold; }
        .explain-icon { font-size: 1.8rem; transition: all 0.3s; }
        .explain-item.highlight .explain-icon { font-size: 2.6rem; }
        
        .direction-arrow {
            position: absolute; bottom: -12px; height: 12px; border-radius: 6px; z-index: 10;
        }
        .direction-arrow::after {
            content: ""; position: absolute; top: -4px; border: 10px solid transparent;
        }
        .arrow-to-right::after { right: -10px; border-left-color: inherit; }
        .arrow-to-left::after { left: -10px; border-right-color: inherit; }

        .count-guide-box {
            position: absolute; bottom: 15px; height: 65%; background: rgba(76, 175, 80, 0.15);
            border: 2px dashed #4CAF50; border-radius: 12px; z-index: 1; pointer-events: none;
        }

        .start-btn { 
            background: linear-gradient(135deg, #ff5722 0%, #ff9800 100%); 
            color: white; border: none; padding: 18px 40px; font-size: 1.6rem; 
            border-radius: 50px; font-weight: bold; box-shadow: 0 6px 0 #d84315; 
            cursor: pointer; z-index: 10;
        }

        /* リザルト画面 */
        #result-screen { justify-content: center; background: #fff9f0; overflow: hidden; }
        
        .sunburst {
            position: absolute; top: 50%; left: 50%; width: 200vmax; height: 200vmax; transform: translate(-50%, -50%);
            background: repeating-conic-gradient(from 0deg, rgba(255, 215, 0, 0.2) 0deg 15deg, transparent 15deg 30deg);
            animation: rotate-sunburst 20s linear infinite; pointer-events: none; z-index: 0;
        }
        @keyframes rotate-sunburst {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* 観覧車を最前面に設定 */
        .animal-ferris-wheel {
            position: absolute; top: 50%; left: 50%; width: 340px; height: 340px; transform: translate(-50%, -50%);
            z-index: 100; /* カードよりも上に */
            pointer-events: none;
        }
        .ferris-item {
            position: absolute; top: 50%; left: 50%; font-size: 3.5rem; margin: -1.75rem;
            animation: ferris-spin 12s linear infinite;
        }
        @keyframes ferris-spin {
            from { transform: rotate(0deg) translate(150px) rotate(0deg); }
            to { transform: rotate(360deg) translate(150px) rotate(-360deg); }
        }

        .result-card {
            background: white; border: 8px solid #ff9800; border-radius: 40px; 
            padding: 25px; width: 85%; max-width: 320px; text-align: center; 
            margin-bottom: 30px; box-shadow: 0 15px 30px rgba(255,152,0,0.3);
            position: relative; z-index: 5; /* 観覧車の下 */
        }

        .score-big { font-size: 6.5rem; color: #e64a19; font-weight: 900; line-height: 1; margin: 10px 0; }
        .confetti { position: absolute; width: 10px; height: 10px; z-index: 150; pointer-events: none; }

        .marker { display: inline-block; position: relative; padding: 0 4px; z-index: 1; }
        .marker::after { content: ''; position: absolute; bottom: 2px; left: 0; width: 0; height: 1.2em; z-index: -1; transition: width 0.6s ease-out; border-radius: 4px; }
        .marker.active::after { width: 100%; }
        .marker-order::after { background-color: var(--marker-order); }
        .marker-count::after { background-color: var(--marker-count); }
    </style>
</head>
<body>

<div id="game-app">
    <div id="title-screen" class="screen active">
        <div class="title-logo">さんすうクイズ<br>なんばんめかな？</div>
        <div class="title-animal-deco">🐶 🐼 🐰</div>
        <button class="start-btn" onclick="startGame()">はじめる</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-top">
            <div class="game-header">
                <div id="progress-text" class="progress-badge">1 / 10</div>
                <div id="score-text" style="font-weight: bold;">せいかい: 0</div>
            </div>
            
            <div class="question-box">
                <div class="question-label-in">✨ もんだい ✨</div>
                <div id="question-box-text" class="question-text"></div>
            </div>

            <div class="animal-row-container">
                <div class="direction-labels"><span id="label-left">ひだり</span><span id="label-right">みぎ</span></div>
                <div id="animal-display" class="animal-row"></div>
            </div>
        </div>
        <div class="game-bottom">
            <div style="text-align: center; font-weight: bold; color: #888; margin-bottom: 8px;">こたえをえらんでね</div>
            <div id="button-area" class="button-grid"></div>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <div class="sunburst"></div>
        <!-- 演出パーツを配置 -->
        <div id="ferris-wheel" class="animal-ferris-wheel"></div>
        <div id="result-medal" style="font-size: 5.5rem; z-index:6; position:relative;">👑</div>
        <div id="result-title" style="font-size: 2.2rem; color: #ff5722; font-weight: bold; margin-bottom: 10px; z-index:6; position:relative;">すごすぎる！</div>
        <div class="result-card">
            <div style="font-weight: bold; color: #666; font-size: 1.2rem;">10もん ちゅう</div>
            <div id="final-score" class="score-big">0</div>
            <div style="font-weight: bold; color: #ff5722; font-size: 1.4rem;">せいかい できたよ！</div>
        </div>
        <button class="start-btn" onclick="showTitle()" style="margin-top: 20px; position:relative; z-index:110;">もういっかい！</button>
    </div>

    <div id="modal-overlay">
        <div class="modal-content">
            <div id="result-icon" style="font-size: 4.5rem;">⭕️</div>
            <div id="result-feedback" style="font-weight: bold; font-size: 1.6rem; margin-bottom: 5px;">せいかい！</div>
            <div class="explanation-box">
                <div id="answer-sentence" style="font-size: 1.4rem; font-weight: bold; margin-bottom: 30px; line-height: 1.4;"></div>
                <div id="explain-visual" class="explain-animals"></div>
            </div>
            <button class="start-btn" onclick="nextStep()" style="width: 100%; padding: 15px;">つぎへ</button>
        </div>
    </div>
</div>

<script>
    const allAnimals = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷', '🐸', '🐵', '🐣', '🐧', '🦕', '🐙', '🦄'];
    const directions = [
        { type: 'left', text: 'ひだり', labels: ['ひだり', 'みぎ'], color: '#ff5722' },
        { type: 'right', text: 'みぎ', labels: ['ひだり', 'みぎ'], color: '#2196f3' },
        { type: 'front', text: 'まえ', labels: ['まえ', 'うしろ'], color: '#ff5722' },
        { type: 'back', text: 'うしろ', labels: ['まえ', 'うしろ'], color: '#2196f3' }
    ];

    let gameState = { questionCount: 0, correctCount: 0, maxQuestions: 10, currentQuestion: {} };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id === 'result-screen') {
            startConfetti();
            setupFerrisWheel();
        }
    }

    function showTitle() { stopConfetti(); showScreen('title-screen'); }

    function startGame() { 
        gameState.questionCount = 0; gameState.correctCount = 0; 
        updateStats(); generateQuestion(); showScreen('game-screen'); 
    }

    function updateStats() { 
        document.getElementById('progress-text').textContent = `${gameState.questionCount + 1} / ${gameState.maxQuestions}`; 
        document.getElementById('score-text').textContent = `せいかい: ${gameState.correctCount}`; 
    }

    function generateQuestion() {
        let count = (gameState.questionCount === 0) ? 5 : (Math.floor(Math.random() * 3) + 5);
        const shuffled = [...allAnimals].sort(() => 0.5 - Math.random());
        const selected = shuffled.slice(0, count);
        const dirObj = directions[Math.floor(Math.random() * directions.length)];
        
        let qType;
        if (gameState.questionCount === 4) {
            qType = 1;
        } else {
            qType = (gameState.questionCount < 4) ? 0 : (Math.random() > 0.5 ? 1 : 0);
        }

        const isReverse = (dirObj.type === 'right' || dirObj.type === 'back');
        let targetIdx = Math.floor(Math.random() * (count - 2)) + 1;
        let answer = (qType === 0) 
            ? (isReverse ? (count - targetIdx) : (targetIdx + 1))
            : (isReverse ? (count - 1 - targetIdx) : targetIdx);

        gameState.currentQuestion = { 
            type: qType, animals: selected, direction: dirObj, 
            target: selected[targetIdx], targetIndex: targetIdx, 
            answer: answer, totalCount: count 
        };
        renderUI();
    }

    function renderUI() {
        const q = gameState.currentQuestion;
        const qText = document.getElementById('question-box-text');
        const shouldShowMarker = gameState.questionCount >= 4;
        const markerClass = shouldShowMarker ? ('marker ' + (q.type === 0 ? 'marker-order' : 'marker-count')) : '';
        
        qText.innerHTML = q.type === 0 
            ? `${q.target} は<br><span style="color:${q.direction.color}">${q.direction.text}</span> から <span class="${markerClass}" id="marker-target">なんばんめ？</span>`
            : `${q.target} の<br><span style="color:${q.direction.color}">${q.direction.text}</span> には <span class="${markerClass}" id="marker-target">なんにん いる？</span>`;
        
        if(shouldShowMarker) {
            setTimeout(() => document.getElementById('marker-target')?.classList.add('active'), 100);
        }
        
        document.getElementById('label-left').textContent = q.direction.labels[0];
        document.getElementById('label-right').textContent = q.direction.labels[1];
        
        const display = document.getElementById('animal-display');
        display.innerHTML = '';
        q.animals.forEach((a, idx) => { 
            const s = document.createElement('span'); s.textContent = a; s.className = 'animal-unit';
            s.onclick = (e) => {
                const isTarget = (idx === q.targetIndex);
                createSparkles(e.target, isTarget);
                e.target.style.transform = isTarget ? 'scale(1.5) rotate(15deg)' : 'translateY(-20px)';
                setTimeout(() => e.target.style.transform = '', 400);
            };
            display.appendChild(s); 
        });
        
        const btnArea = document.getElementById('button-area');
        btnArea.innerHTML = '';
        // 1から8までのボタンを作成
        for (let i = 1; i <= 8; i++) {
            const b = document.createElement('button'); b.className = 'num-btn'; b.textContent = i; 
            b.onclick = () => checkAnswer(i); btnArea.appendChild(b);
        }
    }

    function checkAnswer(selected) {
        const q = gameState.currentQuestion;
        const isCorrect = selected === q.answer;
        if (isCorrect) gameState.correctCount++;
        
        document.getElementById('result-icon').textContent = isCorrect ? '⭕️' : '❌';
        document.getElementById('result-feedback').textContent = isCorrect ? 'せいかい！' : 'おしい！';
        const sentence = document.getElementById('answer-sentence');
        sentence.innerHTML = q.type === 0 
            ? `${q.target} は <span style="color:${q.direction.color}">${q.direction.text}</span> から <span style="font-size:1.6rem; color:${q.direction.color};">${q.answer}</span> ばんめ`
            : `${q.target} の <span style="color:${q.direction.color}">${q.direction.text}</span> には <span style="font-size:1.6rem; color:#4CAF50;">${q.answer}</span> にん いるよ`;

        const visual = document.getElementById('explain-visual');
        visual.innerHTML = '';
        const isReverse = (q.direction.type === 'right' || q.direction.type === 'back');
        const itemWidth = 100 / q.animals.length;

        if (q.type === 0) {
            const arrow = document.createElement('div');
            arrow.className = 'direction-arrow ' + (isReverse ? 'arrow-to-left' : 'arrow-to-right');
            const startPos = isReverse ? (q.animals.length - 1) : 0;
            const endPos = q.targetIndex;
            const left = Math.min(startPos, endPos) * itemWidth + (itemWidth * 0.1);
            const width = Math.abs(startPos - endPos) * itemWidth + (itemWidth * 0.8);
            arrow.style.left = left + "%";
            arrow.style.width = width + "%";
            arrow.style.backgroundColor = q.direction.color;
            arrow.style.borderColor = q.direction.color; 
            visual.appendChild(arrow);
        }

        if (q.type === 1) {
            const guide = document.createElement('div');
            guide.className = 'count-guide-box';
            const startIdx = isReverse ? q.targetIndex + 1 : 0;
            const countLen = q.answer;
            guide.style.left = (startIdx * itemWidth) + "%";
            guide.style.width = (countLen * itemWidth) + "%";
            visual.appendChild(guide);
        }

        q.animals.forEach((a, idx) => {
            const item = document.createElement('div'); 
            item.className = 'explain-item' + (idx === q.targetIndex ? ' highlight' : '');
            const num = document.createElement('div'); num.className = 'explain-num';
            
            if (q.type === 0) {
                const dNum = isReverse ? (q.animals.length - idx) : (idx + 1);
                num.textContent = dNum;
                if (isReverse ? (idx >= q.targetIndex) : (idx <= q.targetIndex)) num.style.background = q.direction.color;
            } else {
                if ((!isReverse && idx < q.targetIndex) || (isReverse && idx > q.targetIndex)) {
                    num.style.background = '#4CAF50'; num.textContent = '●';
                } else if (idx === q.targetIndex) {
                    num.style.background = q.direction.color; num.textContent = '★';
                }
            }
            const icon = document.createElement('div'); icon.className = 'explain-icon'; icon.textContent = a;
            item.append(num, icon); visual.appendChild(item);
        });
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function createSparkles(el, isTarget) {
        const rect = el.getBoundingClientRect();
        for (let i = 0; i < (isTarget ? 15 : 6); i++) {
            const sp = document.createElement('div');
            sp.style.position = 'fixed'; sp.style.width = '8px'; sp.style.height = '8px';
            sp.style.borderRadius = '50%'; sp.style.background = isTarget ? '#FFD700' : '#FF69B4';
            sp.style.left = `${rect.left + rect.width/2}px`; sp.style.top = `${rect.top + rect.height/2}px`;
            sp.style.zIndex = '1000';
            const angle = Math.random() * Math.PI * 2;
            const speed = 2 + Math.random() * 4;
            let vx = Math.cos(angle) * speed; let vy = Math.sin(angle) * speed;
            document.body.appendChild(sp);
            let opacity = 1;
            const anim = setInterval(() => {
                sp.style.left = (parseFloat(sp.style.left) + vx) + 'px';
                sp.style.top = (parseFloat(sp.style.top) + vy) + 'px';
                opacity -= 0.05; sp.style.opacity = opacity;
                if (opacity <= 0) { clearInterval(anim); sp.remove(); }
            }, 20);
        }
    }

    function nextStep() {
        document.getElementById('modal-overlay').style.display = 'none';
        gameState.questionCount++;
        if (gameState.questionCount >= gameState.maxQuestions) showResult();
        else { updateStats(); generateQuestion(); }
    }

    function showResult() {
        const score = gameState.correctCount;
        document.getElementById('final-score').textContent = score;
        const medalEl = document.getElementById('result-medal');
        const titleEl = document.getElementById('result-title');
        
        if (score === 10) { medalEl.textContent = "🥇👑🥇"; titleEl.textContent = "てんさい！パーフェクト！"; }
        else if (score >= 7) { medalEl.textContent = "🥈✨"; titleEl.textContent = "すごい！ばっちり！"; }
        else if (score >= 4) { medalEl.textContent = "🥉👍"; titleEl.textContent = "がんばったね！"; }
        else { medalEl.textContent = "💪"; titleEl.textContent = "つぎもがんばろう！"; }
        
        showScreen('result-screen');
    }

    function setupFerrisWheel() {
        const wheel = document.getElementById('ferris-wheel');
        wheel.innerHTML = '';
        const count = 10; // 動物を少し増やして賑やかに
        const shuffled = [...allAnimals].sort(() => 0.5 - Math.random());
        for (let i = 0; i < count; i++) {
            const item = document.createElement('div');
            item.className = 'ferris-item';
            item.textContent = shuffled[i % shuffled.length];
            item.style.animationDelay = `${(i * (12 / count)) * -1}s`;
            wheel.appendChild(item);
        }
    }

    let confettiInterval;
    function startConfetti() {
        const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#03a9f4', '#00bcd4', '#009688', '#4caf50', '#8bc34a', '#cddc39', '#ffeb3b', '#ffc107', '#ff9800', '#ff5722'];
        const screen = document.getElementById('result-screen');
        confettiInterval = setInterval(() => {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            c.style.left = Math.random() * 100 + 'vw';
            c.style.top = '-10px';
            screen.appendChild(c);
            const duration = 2000 + Math.random() * 3000;
            const anim = c.animate([{ top: '-10px', transform: 'rotate(0deg)' }, { top: '100vh', transform: `rotate(${Math.random() * 1000}deg)` }], { duration: duration });
            anim.onfinish = () => c.remove();
        }, 80);
    }

    function stopConfetti() { clearInterval(confettiInterval); document.querySelectorAll('.confetti').forEach(c => c.remove()); }

    window.onload = showTitle;
</script>
</body>
</html>
